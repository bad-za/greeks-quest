name = "greeks-quest-tutor"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Секреты (задаются через `npx wrangler secret put <ИМЯ>`, в репозиторий не попадают):
#   ANTHROPIC_API_KEY — ключ Anthropic API
#   BOT_TOKEN         — токен Telegram-бота (проверка подписи initData + отправка сообщений)
#   WEBHOOK_SECRET    — случайная строка, та же, что в secret_token при setWebhook (см. README)

[vars]
# Telegram user ID, которым разрешён доступ (через запятую) — тот же список, что в src/App.tsx
ALLOWED_USERS = "217306978"
# Модель тьютора. Кандидат на удешевление: "claude-haiku-4-5-20251001" —
# перед переключением сравни качество ответов на вопросах из STARTERS (wrangler dev).
MODEL = "claude-sonnet-4-6"

# Дневной лимит вопросов включается биндингом KV (без него код работает, лимита нет):
#   npx wrangler kv namespace create TUTOR_KV
# и вставь сюда выданный id:
# [[kv_namespaces]]
# binding = "TUTOR_KV"
# id = "<id из команды выше>"
